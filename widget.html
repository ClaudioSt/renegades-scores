<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spielplan Widget</title>
  <style>
    :root { --accent: #ff4500; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: transparent; color: #f0f0f0; padding: 20px; }
    .widget-wrapper { max-width: 900px; margin: 0 auto; }
    .team-block { margin-bottom: 48px; }
    .team-title {
      font-size: 1.6rem; font-weight: 800; color: var(--accent);
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 24px; padding-bottom: 8px; border-bottom: 2px solid var(--accent);
    }
    .team-title:empty { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .section-title {
      font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3px; color: #888; margin: 24px 0 12px 0;
    }
    .progress-wrap { margin: 12px 0; }
    .progress-bar-bg { background: #222; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar-fg { background: var(--accent); height: 6px; border-radius: 4px; transition: width 0.2s ease; }
    .progress-label { font-size: 0.75rem; color: #666; margin-top: 6px; }
    .live-banner {
      background: #ff0000; color: #fff; border-radius: 8px;
      padding: 16px 20px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .live-banner .live-badge {
      background: #fff; color: #ff0000; font-weight: 900;
      font-size: 0.7rem; letter-spacing: 2px; padding: 3px 8px;
      border-radius: 4px; animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-banner .live-info { flex: 1; font-size: 1rem; font-weight: 600; }
    .live-banner .live-score { font-size: 1.4rem; font-weight: 900; }
    .live-banner a {
      background: #fff; color: #ff0000; text-decoration: none;
      font-weight: 700; font-size: 0.8rem; padding: 8px 14px;
      border-radius: 6px; white-space: nowrap;
    }
    .next-game-highlight {
      border: 2px solid var(--accent);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.04);
    }
    .next-game-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .next-game-date { font-size: 0.85rem; color: #aaa; margin-bottom: 2px; }
    .next-game-name { font-weight: 600; margin-bottom: 2px; }
    .next-game-opponent { font-size: 0.9rem; }
    .gameday-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; margin-bottom: 16px; overflow: hidden;
    }
    .gameday-header {
      background: #222; padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; border-bottom: 1px solid #333;
    }
    .gameday-header .gd-name { font-weight: 700; font-size: 1rem; color: #fff; }
    .gameday-header .gd-meta { font-size: 0.75rem; color: #888; display: flex; gap: 12px; }
    .gameday-header .gd-league {
      background: #333; color: #ccc; padding: 2px 8px;
      border-radius: 4px; font-size: 0.7rem; font-weight: 600;
    }
    .game-row { border-bottom: 1px solid #222; }
    .game-row:last-child { border-bottom: none; }
    .game-row-main {
      padding: 14px 18px; display: grid;
      grid-template-columns: 1fr auto 1fr; align-items: center;
      gap: 12px;
    }
    .game-row.has-detail .game-row-main { cursor: pointer; }
    .game-row.has-detail .game-row-main:hover { background: rgba(255,255,255,0.04); border-radius: 4px; }
    .game-row .team-home { text-align: right; font-weight: 600; font-size: 0.95rem; }
    .game-row .team-away { text-align: left;  font-weight: 600; font-size: 0.95rem; }
    .team-home.highlight, .team-away.highlight { color: var(--accent); }
    .game-row .score-box { text-align: center; min-width: 90px; }
    .game-detail { padding: 10px 18px 14px; border-top: 1px solid #1c1c1c; }
    .detail-halves { display: flex; gap: 40px; margin-bottom: 12px; }
    .game-detail .half { display: flex; flex-direction: column; gap: 3px; }
    .game-detail .half-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .game-detail .half-score { font-size: 0.9rem; font-weight: 700; color: #ccc; }
    .game-log { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-top: 4px; }
    .game-log th { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #555; padding: 4px 6px; border-bottom: 1px solid #222; }
    .game-log th:first-child { text-align: right; }
    .game-log th:last-child  { text-align: left; }
    .game-log th:nth-child(2) { text-align: center; min-width: 52px; }
    .game-log td { padding: 2px 6px; color: #888; vertical-align: middle; }
    .game-log .log-l { text-align: right; }
    .game-log .log-s { text-align: center; font-weight: 700; color: #ccc; font-size: 0.82rem; white-space: nowrap; }
    .game-log .log-r { text-align: left; }
    .game-log .log-marker td { text-align: center; color: #444; font-style: italic; padding: 5px 0; }
    .game-log s { color: #555; }
    .standings-wrapper { max-width: 900px; margin: 0 auto; }
    .standings-league-title {
      font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3px; color: #888; margin: 24px 0 12px 0;
    }
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
      color: #555; padding: 8px 6px; border-bottom: 1px solid #333; text-align: right;
    }
    .standings-table th.col-team { text-align: left; }
    .standings-table td {
      padding: 8px 6px; border-bottom: 1px solid #1c1c1c;
      font-size: 0.85rem; text-align: right; color: #ccc;
    }
    .standings-table td.col-team { text-align: left; font-weight: 600; color: #f0f0f0; }
    .standings-row-highlight td { color: var(--accent); font-weight: 700; }
    .standings-row-restricted td { opacity: 0.55; }
    .standings-empty { color: #555; font-size: 0.85rem; padding: 16px 0; }
    .score-box .time { font-size: 0.75rem; color: #888; }
    .score-box .score { font-size: 1.2rem; font-weight: 900; color: #fff; }
    .score-box .score.win  { color: #4caf50; }
    .score-box .score.loss { color: #f44336; }
    .score-box .score.draw { color: #ff9800; }
    .score-box .stage-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .upcoming-time { font-size: 0.85rem; font-weight: 700; color: #aaa; }
    .no-data { color: #555; font-style: italic; font-size: 0.9rem; padding: 16px 0; }
    .loading  { color: #555; font-size: 0.85rem; padding: 20px 0; text-align: center; }
    .error-banner {
      background: #2a1010; border: 1px solid #5a2020;
      border-radius: 8px; padding: 12px 16px;
      color: #f44336; font-size: 0.85rem; margin-bottom: 12px;
    }
    @media (max-width: 600px) {
      .game-row-main { gap: 6px; padding: 12px; }
      .game-detail { padding: 8px 12px 12px; }
      .detail-halves { gap: 24px; }
      .game-row .team-home, .game-row .team-away { font-size: 0.8rem; }
      .score-box .score { font-size: 1rem; }
    }
    .load-more { display:block; width:100%; margin:6px 0 0; padding:6px 0;
      background:none; border:1px solid var(--accent); border-radius:4px;
      color:var(--accent); font-size:0.85rem; cursor:pointer; }
    .load-more:hover { background:rgba(var(--accent-rgb,255,69,0),0.08); }
    body.compact { padding: 12px; }
    body.compact .team-block { margin-bottom: 28px; }
    body.compact .gameday-card { margin-bottom: 10px; }
    body.compact .gameday-header { padding: 8px 14px; }
    body.compact .game-row-main { padding: 10px 14px; }
    body.compact .game-row .team-home, body.compact .game-row .team-away { font-size: 0.85rem; }
    body.compact .score-box .score { font-size: 1rem; }
  </style>
</head>
<body>
<div class="widget-wrapper" id="root"></div>
<script>

// ── CONSTANTS ────────────────────────────────────────────────────────────────
var API_BASE          = 'https://leaguesphere.app/api';
var LIVETICKER_BASE   = 'https://leaguesphere.app/liveticker/';
var BATCH_SIZE        = 50;
var DISCOVERY_TTL_MS  = 7 * 24 * 60 * 60 * 1000;
var CACHE_VERSION     = 3;
var _pastCache        = {};

// ── URL PARAMS ───────────────────────────────────────────────────────────────
function parseConfigFromSearch(search) {
  var params      = new URLSearchParams(search);
  var teams       = params.getAll('t').map(Number).filter(function(n) { return Number.isInteger(n) && n > 0; });
  var color       = (params.get('color') || 'ff4500').replace(/^#/, '');
  var refresh     = params.has('refresh');
  var past        = Math.max(1, parseInt(params.get('past'),   10) || 3);
  var future      = Math.max(0, parseInt(params.get('future'), 10) || 0);  // 0 = all
  var showPast    = params.get('show_past')   !== '0';
  var showFuture  = params.get('show_future') !== '0';
  var showTitle   = params.get('title')       !== '0';
  var compact     = params.get('compact')     === '1';
  var view        = params.get('view') || 'spielplan';
  return { teams: teams, color: color, refresh: refresh, past: past, future: future,
           showPast: showPast, showFuture: showFuture, showTitle: showTitle, compact: compact, view: view };
}
function parseConfig() { return parseConfigFromSearch(window.location.search); }

// ── SECURITY ─────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
}

function getResultClass(teamId, results) {
  var me    = results.find(function(r) { return r.team_id === teamId; });
  var other = results.find(function(r) { return r.team_id !== teamId; });
  if (!me || !other || me.pa == null || other.pa == null) return '';
  if (me.pa < other.pa) return 'win';   // pa = points against; fewer points against = win
  if (me.pa > other.pa) return 'loss';
  return 'draw';
}

var _teamNameByAbbrev = {};
function resolveTeamName(abbrev) { return _teamNameByAbbrev[abbrev] || abbrev; }

function renderGameLogEvents(log, results) {
  // Determine which of log.l / log.r is home by matching team names in results
  var leftIsHome = null;
  results.forEach(function(r) {
    var full = resolveTeamName(r.team_name);
    if (full === log.l || r.team_name === log.l) leftIsHome = r.isHome;
  });

  var rows = log.ev.map(function(ev) {
    if (ev.b) return '<tr class="log-marker"><td colspan="3">' + escapeHtml(ev.b) + '</td></tr>';
    var lHtml = ev.l ? (ev.lx ? '<s>' + escapeHtml(ev.l) + '</s>' : escapeHtml(ev.l)) : '';
    var rHtml = ev.r ? (ev.rx ? '<s>' + escapeHtml(ev.r) + '</s>' : escapeHtml(ev.r)) : '';
    return '<tr><td class="log-l">' + lHtml + '</td><td class="log-s">' + escapeHtml(ev.s || '') + '</td><td class="log-r">' + rHtml + '</td></tr>';
  }).join('');

  return '<table class="game-log">'
    + '<thead><tr><th>' + escapeHtml(log.l) + '</th><th>Stand</th><th>' + escapeHtml(log.r) + '</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>';
}

var _openDetail = null;
function _toggleGameDetail(mainEl) {
  var detail = mainEl.parentElement.querySelector('.game-detail');
  if (!detail) return;
  var isOpen = _openDetail === detail;
  if (_openDetail) { _openDetail.hidden = true; _openDetail = null; }
  if (!isOpen) { detail.hidden = false; _openDetail = detail; }
}

// ── CACHE ────────────────────────────────────────────────────────────────────
function cacheKey(teamId) { return 'lsw_' + teamId; }

function loadCache(teamId, storage) {
  var store = storage || localStorage;
  try {
    var raw = store.getItem(cacheKey(teamId));
    if (!raw) return null;
    var cache = JSON.parse(raw);
    if (cache.version !== CACHE_VERSION) return null;
    return cache;
  } catch(e) { return null; }
}

function saveCache(teamId, data, storage) {
  var store = storage || localStorage;
  try {
    store.setItem(cacheKey(teamId), JSON.stringify(Object.assign({}, data, { version: CACHE_VERSION })));
    return true;
  } catch(e) { return false; }
}

function clearCache(teamId, storage) {
  var store = storage || localStorage;
  try { store.removeItem(cacheKey(teamId)); } catch(e) {}
}

function needsDiscovery(cache) {
  if (!cache || !cache.next_discovery) return true;
  return new Date(cache.next_discovery) <= new Date();
}

// ── CONCURRENCY ──────────────────────────────────────────────────────────────
async function batchedAll(items, asyncFn, batchSize, onBatchDone) {
  var results = [];
  for (var i = 0; i < items.length; i += batchSize) {
    var batch       = items.slice(i, i + batchSize);
    var batchResult = await Promise.all(batch.map(asyncFn));
    results.push.apply(results, batchResult);
    if (onBatchDone) onBatchDone(results.length, items.length);
  }
  return results;
}

// ── CLASSIFICATION ───────────────────────────────────────────────────────────
function classifyGameday(gd, games, teamId, today) {
  var t = today || new Date().toISOString().slice(0, 10);
  var teamGames = games.filter(function(g) {
    return g.results.some(function(r) { return r.team_id === teamId; });
  });
  if (teamGames.length === 0) return null;
  if (gd.date < t) return 'past';
  var allDone = teamGames.every(function(g) { return g.status === 'beendet'; });
  if (allDone) return 'past';
  return 'active';
}

// ── API ──────────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  var res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status + ' - ' + url);
  return res.json();
}

// ── SNAPSHOT ─────────────────────────────────────────────────────────────────
var _snapshotPromise = null;
async function loadSnapshot() {
  if (!_snapshotPromise) {
    var base = window.location.href.replace(/[^/]*$/, '');
    _snapshotPromise = fetchJSON(base + 'snapshot.json').then(function(snap) {
      snap.teams.forEach(function(t) { _teamNameByAbbrev[t.abbrev] = t.name; });
      return snap;
    });
  }
  return _snapshotPromise;
}

var _newGamedaysPromise = null;
async function fetchNewGamedays() {
  if (!_newGamedaysPromise) {
    _newGamedaysPromise = loadSnapshot().then(function(snap) {
      var maxId = Math.max.apply(null, snap.gamedays.map(function(gd) { return gd.id; }));
      return fetchJSON(API_BASE + '/gamedays/?format=json&page_size=100').then(function(d) {
        return d.results
          .filter(function(gd) { return gd.id > maxId; })
          .map(function(gd) {
            return {
              id:             gd.id,
              date:           gd.date,
              name:           gd.name           || '',
              start:          gd.start          || '',
              league_display: gd.league_display || '',
              address:        gd.address        || '',
            };
          });
      });
    });
  }
  return _newGamedaysPromise;
}

async function fetchGames(gamedayId) {
  return fetchJSON(API_BASE + '/gamedays/' + gamedayId + '/games/?format=json');
}

async function fetchGamedayDetail(gamedayId) {
  return fetchJSON(API_BASE + '/gamedays/' + gamedayId + '/?format=json');
}

// ── DISCOVERY ────────────────────────────────────────────────────────────────
async function discoverNewGamedays(teamId, knownIds, onProgress) {
  var snap        = await loadSnapshot();
  var newGds      = await fetchNewGamedays();
  var allGamedays = snap.gamedays.concat(newGds);
  var newGamedays = allGamedays.filter(function(gd) { return !knownIds.has(gd.id); });
  if (newGamedays.length === 0) return [];

  // Snapshot gamedays carry their games — use directly; truly new gamedays fetch from API
  var fromSnapshot = newGamedays.filter(function(gd) { return gd.games; });
  var needFetch    = newGamedays.filter(function(gd) { return !gd.games; });

  var snapshotEntries = fromSnapshot
    .map(function(gd) { return { gd: gd, games: gd.games }; })
    .filter(function(e) {
      return e.games.some(function(g) {
        return g.results.some(function(r) { return r.team_id === teamId; });
      });
    });

  if (needFetch.length === 0) {
    if (onProgress) onProgress(snapshotEntries.length, snapshotEntries.length);
    return snapshotEntries;
  }

  var fetched = await batchedAll(needFetch, async function(gd) {
    try {
      var games = await fetchGames(gd.id);
      return { gd: gd, games: games };
    } catch(e) { return null; }
  }, BATCH_SIZE, function(done, total) {
    if (onProgress) onProgress(snapshotEntries.length + done, snapshotEntries.length + total);
  });

  return snapshotEntries.concat(
    fetched
      .filter(function(e) { return e !== null; })
      .filter(function(e) {
        return e.games.some(function(g) {
          return g.results.some(function(r) { return r.team_id === teamId; });
        });
      })
  );
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderProgress(done, total) {
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  return '<div class="progress-wrap">'
    + '<div class="progress-bar-bg"><div class="progress-bar-fg" style="width:' + pct + '%"></div></div>'
    + '<div class="progress-label">Erkenne Spieltage… ' + done + ' / ' + total + '</div>'
    + '</div>';
}

function renderLiveBanner(game, gd, teamId) {
  var home = game.results.find(function(r) { return r.isHome; });
  var away = game.results.find(function(r) { return !r.isHome; });
  if (!home || !away) return '';
  var homeName  = escapeHtml(resolveTeamName(home.team_name));
  var awayName  = escapeHtml(resolveTeamName(away.team_name));
  var gdName    = escapeHtml(gd.name);
  var league    = escapeHtml(gd.league_display || '');
  var tickerUrl = LIVETICKER_BASE + '?gameday=' + encodeURIComponent(gd.id);
  return '<div class="live-banner">'
    + '<span class="live-badge">● LIVE</span>'
    + '<div class="live-info">' + homeName + ' vs. ' + awayName + '<br><small>' + gdName + ' · ' + league + '</small></div>'
    + '<div class="live-score">' + (function(hs){ return (hs && hs.home != null && hs.away != null) ? hs.home + ' : ' + hs.away : '– : –'; })(game.halftime_score) + '</div>'
    + '<a href="' + tickerUrl + '" target="_blank">🔴 Liveticker</a>'
    + '</div>';
}

function renderGameRow(game, teamId, showScore) {
  var home = game.results.find(function(r) { return r.isHome; });
  var away = game.results.find(function(r) { return !r.isHome; });
  if (!home || !away) return '';

  var homeName = escapeHtml(resolveTeamName(home.team_name));
  var awayName = escapeHtml(resolveTeamName(away.team_name));
  var homeHL   = home.team_id === teamId ? ' highlight' : '';
  var awayHL   = away.team_id === teamId ? ' highlight' : '';
  var stage    = escapeHtml(game.stage || '');
  var standing = game.standing ? ' · ' + escapeHtml(game.standing) : '';
  var time     = escapeHtml(game.scheduled.slice(0, 5));
  var field    = escapeHtml(String(game.field));

  var scoreHTML;
  if (!showScore) {
    scoreHTML = '<div class="upcoming-time">' + time + ' Uhr</div>';
  } else {
    var cls = getResultClass(teamId, game.results);
    var hs  = game.halftime_score;
    var fs  = game.final_score;
    if (!fs) {
      scoreHTML = '<div class="score">(kein Ergebnis)</div>';
    } else {
      scoreHTML = '<div class="score ' + cls + '">' + fs.home + ' : ' + fs.away + '</div>';
    }
  }

  var detailHTML = '';
  var hs2 = game.halftime_score, fs2 = game.final_score;
  if (showScore && (hs2 || game.log)) {
    var halvesHTML = '';
    if (hs2 && fs2) {
      var sh_home = fs2.home - hs2.home, sh_away = fs2.away - hs2.away;
      halvesHTML = '<div class="detail-halves">'
        + '<div class="half"><div class="half-label">1. Halbzeit</div><div class="half-score">' + hs2.home + ' : ' + hs2.away + '</div></div>'
        + '<div class="half"><div class="half-label">2. Halbzeit</div><div class="half-score">' + sh_home + ' : ' + sh_away + '</div></div>'
        + '</div>';
    }
    var logHTML = game.log ? renderGameLogEvents(game.log, game.results) : '';
    detailHTML = '<div class="game-detail" hidden>' + halvesHTML + logHTML + '</div>';
  }

  var rowClass = detailHTML ? ' has-detail' : '';
  var clickAttr = detailHTML ? ' onclick="_toggleGameDetail(this)"' : '';
  return '<div class="game-row' + rowClass + '">'
    + '<div class="game-row-main"' + clickAttr + '>'
    +   '<div class="team-home' + homeHL + '">' + homeName + '</div>'
    +   '<div class="score-box">'
    +     '<div class="time">' + time + ' Uhr · Feld ' + field + '</div>'
    +     scoreHTML
    +     '<div class="stage-label">' + stage + standing + '</div>'
    +   '</div>'
    +   '<div class="team-away' + awayHL + '">' + awayName + '</div>'
    + '</div>'
    + detailHTML
    + '</div>';
}

function renderGamedayCard(gd, games, teamId, showScore) {
  var teamGames = games.filter(function(g) {
    return g.results.some(function(r) { return r.team_id === teamId; });
  });
  if (teamGames.length === 0) return '';

  var rows   = teamGames.slice().sort(function(a,b) {
    return (b.scheduled || '').localeCompare(a.scheduled || '');
  }).map(function(g) { return renderGameRow(g, teamId, showScore); }).join('');
  var name   = escapeHtml(gd.name);
  var date   = escapeHtml(formatDate(gd.date));
  var start  = escapeHtml(gd.start);
  var league = escapeHtml(gd.league_display || '');
  var addrRaw = (gd.address || '').trim();
  var skipAddr = !addrRaw || ['tba','tbd','adresse folgt'].some(function(s) { return addrRaw.toLowerCase().startsWith(s); });
  var addr   = skipAddr ? '' : '<span>📍 ' + escapeHtml(addrRaw.split(',')[0]) + '</span>';

  return '<div class="gameday-card">'
    + '<div class="gameday-header">'
    +   '<div><div class="gd-name">' + name + '</div>'
    +   '<div class="gd-meta"><span>' + date + '</span><span>' + start + ' Uhr</span>' + addr + '</div></div>'
    +   '<div class="gd-league">' + league + '</div>'
    + '</div>'
    + rows
    + '</div>';
}

function renderNextGameCard(gd, game, teamId) {
  var me    = game.results.find(function(r) { return r.team_id === teamId; });
  var other = game.results.find(function(r) { return r.team_id !== teamId; });
  if (!me || !other) return '';
  var time = '';
  if (game.scheduled) {
    var t = game.scheduled.slice(11, 16);
    if (t) time = ' · ' + t + ' Uhr';
  }
  var location = me.isHome ? 'Heimspiel' : 'Auswärtsspiel';
  return '<div class="next-game-highlight">'
    + '<div class="next-game-label">Nächstes Spiel</div>'
    + '<div class="next-game-date">' + escapeHtml(formatDate(gd.date)) + time + '</div>'
    + '<div class="next-game-name">' + escapeHtml(gd.name) + '</div>'
    + '<div class="next-game-opponent">' + escapeHtml(location) + ' · ' + escapeHtml(other.team_name) + '</div>'
    + '</div>';
}

function resolveTeamAbbrev(teamId, entries) {
  for (var i = 0; i < entries.length; i++) {
    var games = entries[i].games;
    for (var j = 0; j < games.length; j++) {
      var r = games[j].results.find(function(result) { return result.team_id === teamId; });
      if (r) return r.team_name;
    }
  }
  return String(teamId);
}

// ── SNAPSHOT QUICK-RENDER ───────────────────────────────────────────────────
function quickRenderFromSnap(snap, teamId, els, cfg, today) {
  var forTeam = snap.gamedays.filter(function(gd) {
    return gd.games && gd.games.some(function(g) {
      return g.results.some(function(r) { return r.team_id === teamId; });
    });
  });
  var past = forTeam
    .filter(function(gd) { return classifyGameday(gd, gd.games, teamId, today) === 'past'; })
    .sort(function(a, b) { return b.date.localeCompare(a.date); });
  var active = forTeam
    .filter(function(gd) { return classifyGameday(gd, gd.games, teamId, today) === 'active'; })
    .sort(function(a, b) { return a.date.localeCompare(b.date); });

  if (els.past && past.length) {
    var pastWrapped = past.map(function(gd) { return { gd: gd, games: gd.games }; });
    _pastCache[teamId] = pastWrapped;
    els.past.innerHTML = renderPastSection(pastWrapped, teamId, cfg.past);
  }
  if (els.future && active.length) {
    var sf = cfg.future > 0 ? active.slice(0, cfg.future) : active;
    els.future.innerHTML = sf.map(function(gd) { return renderGamedayCard(gd, gd.games, teamId, false); }).join('');
  }
}
// ── LOAD TEAM ────────────────────────────────────────────────────────────────
async function loadTeam(teamId, els, cfg) {
  var today = new Date().toISOString().slice(0, 10);
  var snap  = await loadSnapshot();
  var snapTeam = snap.teams.find(function(t) { return t.id === teamId; });
  if (els.title && snapTeam) els.title.textContent = snapTeam.name;
  var cache = loadCache(teamId);

  // Phase 1: Instant render — cache for returning users, snapshot for first-time users
  if (cache && cache.past && cache.past.length) {
    if (els.past) {
      var sorted = cache.past.slice().sort(function(a,b) { return b.gd.date.localeCompare(a.gd.date); });
      els.past.innerHTML = sorted.map(function(e) { return renderGamedayCard(e.gd, e.games, teamId, true); }).join('');
    }
  } else {
    quickRenderFromSnap(snap, teamId, els, cfg, today);
  }

  // Phase 2: Discover new gamedays (updates display when done)
  if (needsDiscovery(cache)) {
    var knownIds = new Set(
      (cache && cache.past ? cache.past.map(function(p) { return p.id; }) : [])
      .concat(cache && cache.active_ids ? cache.active_ids : [])
    );

    if (els.future && !els.future.firstChild) els.future.innerHTML = renderProgress(0, 1);

    var newEntries = await discoverNewGamedays(teamId, knownIds, function(done, total) {
      if (els.future) els.future.innerHTML = renderProgress(done, total);
    });

    if (!cache) cache = { past: [], active_ids: [] };

    newEntries.forEach(function(e) {
      var cls = classifyGameday(e.gd, e.games, teamId, today);
      if (cls === 'past' && !cache.past.some(function(p) { return p.id === e.gd.id; })) {
        cache.past.push({ id: e.gd.id, gd: e.gd, games: e.games });
      } else if (cls === 'active' && cache.active_ids.indexOf(e.gd.id) === -1) {
        cache.active_ids.push(e.gd.id);
      }
    });

    cache.next_discovery = new Date(Date.now() + DISCOVERY_TTL_MS).toISOString();
    cache.scanned_at     = new Date().toISOString();
  }

  // Always re-fetch active gamedays for current scores/status
  var activeEntries = (await Promise.all(
    (cache.active_ids || []).map(async function(id) {
      try {
        var results = await Promise.all([fetchGamedayDetail(id), fetchGames(id)]);
        var gd    = results[0];
        var games = results[1];
        gd.league_display = gd.league_display || '';
        return { id: id, gd: gd, games: games };
      } catch(e) { return null; }
    })
  )).filter(Boolean);

  // Promote completed active gamedays to permanent past cache
  var newActiveIds = [];
  activeEntries.forEach(function(e) {
    var cls = classifyGameday(e.gd, e.games, teamId, today);
    if (cls === 'past') {
      if (!cache.past.some(function(p) { return p.id === e.id; }))
        cache.past.push({ id: e.id, gd: e.gd, games: e.games });
    } else {
      newActiveIds.push(e.id);
    }
  });
  cache.active_ids = newActiveIds;
  saveCache(teamId, cache);

  // Resolve display name from first matching game result
  var allEntries = cache.past.concat(activeEntries);
  var abbrev      = resolveTeamAbbrev(teamId, allEntries);
  if (els.title) els.title.textContent = resolveTeamName(abbrev);

  // Live section
  var liveItems = [];
  activeEntries.forEach(function(e) {
    e.games.forEach(function(g) {
      if (g.status === 'live' && g.results.some(function(r) { return r.team_id === teamId; }))
        liveItems.push({ game: g, gd: e.gd });
    });
  });
  if (liveItems.length) {
    els.live.innerHTML = '<div class="section-title">🔴 Live jetzt</div>'
      + liveItems.map(function(x) { return renderLiveBanner(x.game, x.gd, teamId); }).join('');
  } else {
    els.live.innerHTML = '';
  }

  // Past section
  if (els.past) {
    var pastSorted = cache.past.slice().sort(function(a,b) { return b.gd.date.localeCompare(a.gd.date); });
    if (!pastSorted.length) {
      els.past.innerHTML = '<div class="no-data">Keine vergangenen Spieltage gefunden.</div>';
    } else {
      _pastCache[teamId] = pastSorted;
      els.past.innerHTML = renderPastSection(pastSorted, teamId, cfg.past);
    }
  }

  // Future/active section
  if (els.future) {
    var futureEntries = activeEntries
      .filter(function(e) { return classifyGameday(e.gd, e.games, teamId, today) === 'active'; })
      .sort(function(a,b) { return a.gd.date.localeCompare(b.gd.date); });
    if (cfg.future > 0) futureEntries = futureEntries.slice(0, cfg.future);
    var nextResult = findNextGame(futureEntries, teamId, today);
    var highlightHtml = nextResult ? renderNextGameCard(nextResult.gd, nextResult.game, teamId) : '';
    els.future.innerHTML = highlightHtml + (futureEntries.length
      ? futureEntries.map(function(e) { return renderGamedayCard(e.gd, e.games, teamId, false); }).join('')
      : '<div class="no-data">Keine kommenden Spieltage geplant.</div>');
  }
}

function renderPastSection(pastSorted, teamId, visibleCount) {
  if (!pastSorted.length) return '';
  var shown = pastSorted.slice(0, visibleCount);
  var html  = shown.map(function(e) { return renderGamedayCard(e.gd, e.games, teamId, true); }).join('');
  var remaining = pastSorted.length - visibleCount;
  if (remaining > 0) {
    html += '<button class="load-more" data-team="' + teamId + '" data-visible="' + visibleCount + '">'
      + 'Weitere laden (' + remaining + ')'
      + '</button>';
  }
  return html;
}

// ── VIEW RENDERERS ───────────────────────────────────────────────────────────

var findNextGame = function(activeEntries, teamId, today) {
  var qualifying = activeEntries.filter(function(entry) {
    return entry.gd.date >= today;
  });
  qualifying.sort(function(a, b) {
    return a.gd.date < b.gd.date ? -1 : a.gd.date > b.gd.date ? 1 : 0;
  });
  for (var i = 0; i < qualifying.length; i++) {
    var entry = qualifying[i];
    for (var j = 0; j < entry.games.length; j++) {
      var game = entry.games[j];
      if (game.status === 'final') continue;
      var hasTeam = game.results.some(function(r) { return r.team_id === teamId; });
      if (hasTeam) return { gd: entry.gd, game: game };
    }
  }
  return null;
};

async function renderSpielplan(root, cfg) {
  var elMap = {};
  cfg.teams.forEach(function(teamId) {
    var block = document.createElement('div');
    block.className = 'team-block';
    block.innerHTML =
      (cfg.showTitle ? '<div class="team-title" id="t-title-' + teamId + '"></div>' : '')
      + '<div id="t-live-' + teamId + '"></div>'
      + (cfg.showPast
          ? '<div class="section-title">Vergangene Spieltage</div>'
            + '<div id="t-past-' + teamId + '"><div class="loading">Lade Daten…</div></div>'
          : '')
      + (cfg.showFuture
          ? '<div class="section-title">Kommende Spieltage</div>'
            + '<div id="t-future-' + teamId + '"><div class="loading">Lade Daten…</div></div>'
          : '');
    root.appendChild(block);
    elMap[teamId] = {
      title:  document.getElementById('t-title-'  + teamId),
      live:   document.getElementById('t-live-'   + teamId),
      past:   document.getElementById('t-past-'   + teamId),
      future: document.getElementById('t-future-' + teamId),
    };
  });

  await Promise.all(cfg.teams.map(async function(teamId) {
    try {
      await loadTeam(teamId, elMap[teamId], cfg);
    } catch(err) {
      console.error('Widget error (team ' + teamId + '):', err);
      var errBanner = '<div class="error-banner">Fehler beim Laden: ' + escapeHtml(err.message) + '</div>';
      if (elMap[teamId].future) elMap[teamId].future.innerHTML = errBanner;
      if (elMap[teamId].past && elMap[teamId].past.querySelector('.loading'))
        elMap[teamId].past.innerHTML = errBanner;
    }
  }));

  root.addEventListener('click', function(e) {
    var btn = e.target.closest('.load-more');
    if (!btn) return;
    var teamId     = parseInt(btn.getAttribute('data-team'), 10);
    var newVisible = parseInt(btn.getAttribute('data-visible'), 10) + 3;
    var pastEl = document.getElementById('t-past-' + teamId);
    if (!pastEl || !_pastCache[teamId]) return;
    pastEl.innerHTML = renderPastSection(_pastCache[teamId], teamId, newVisible);
  });
}

function renderTableView(root, cfg) {
  root.innerHTML = '';
}

// ── INIT ─────────────────────────────────────────────────────────────────────
(async function() {
  var cfg = parseConfig();
  document.documentElement.style.setProperty('--accent', '#' + cfg.color);
  if (cfg.compact) document.body.classList.add('compact');

  if (cfg.teams.length === 0) {
    document.getElementById('root').innerHTML =
      '<div class="error-banner">Kein Team konfiguriert. Bitte ?t=&lt;team_id&gt; in der URL angeben.</div>';
    return;
  }

  if (cfg.refresh) cfg.teams.forEach(function(id) { clearCache(id); });

  var root = document.getElementById('root');

  if (cfg.view === 'table') {
    renderTableView(root, cfg);
  } else {
    await renderSpielplan(root, cfg);
  }
})();

function reportHeight() {
  window.parent.postMessage(
    { type: 'iframeHeight', height: document.body.getBoundingClientRect().height },
    '*'
  );
}
var _reportHeightTimer;
new ResizeObserver(function() {
  clearTimeout(_reportHeightTimer);
  _reportHeightTimer = setTimeout(reportHeight, 50);
}).observe(document.body);
</script>
