<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #f0f0f0; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.4rem; color: #ff4500; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    label { display: block; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 20px; }

    .team-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .team-search-wrap { position: relative; flex: 1; }
    .team-search-input {
      background: #1a1a1a; border: 1px solid #333; color: #f0f0f0;
      border-radius: 6px; padding: 10px 14px; font-size: 1rem; width: 100%; outline: none;
    }
    .team-search-input:focus { border-color: #555; }
    .team-search-input.selected { border-color: #4caf50; }
    .team-search-input.err { border-color: #f44336; }
    .team-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: #1e1e1e; border: 1px solid #444; border-top: none;
      border-radius: 0 0 6px 6px; max-height: 220px; overflow-y: auto;
    }
    .team-dropdown[hidden] { display: none; }
    .team-dropdown-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px; cursor: pointer; font-size: 0.9rem;
      border-bottom: 1px solid #2a2a2a;
    }
    .team-dropdown-item:last-child { border-bottom: none; }
    .team-dropdown-item:hover, .team-dropdown-item.focused { background: #2d2d2d; }
    .item-id { font-size: 0.75rem; color: #555; }
    .team-status { font-size: 0.9rem; color: #888; padding-top: 12px; }
    .team-status.ok  { color: #4caf50; }
    .remove-btn {
      background: none; border: none; color: #555; font-size: 1.3rem;
      cursor: pointer; padding: 8px 2px; margin-top: 0; line-height: 1;
    }
    .remove-btn:hover { color: #f44336; background: none; }

    input[type=color] {
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      height: 44px; padding: 4px; cursor: pointer; width: 100%;
    }
    button {
      background: #ff4500; color: #fff; border: none; border-radius: 6px;
      padding: 10px 20px; font-size: 0.9rem; cursor: pointer; font-weight: 700; margin-top: 8px;
    }
    button:hover { background: #e03d00; }
    button.secondary { background: #222; border: 1px solid #333; color: #f0f0f0; }
    button.secondary:hover { background: #2a2a2a; }
    #output-section { margin-top: 32px; display: none; }
    #output-section h2 { font-size: 1rem; margin-bottom: 12px; color: #ccc; }
    textarea {
      width: 100%; background: #1a1a1a; border: 1px solid #333; color: #4caf50;
      border-radius: 6px; padding: 14px; font-family: monospace;
      font-size: 0.85rem; resize: vertical; min-height: 100px;
    }
    .copy-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
    .copy-confirm { font-size: 0.8rem; color: #4caf50; opacity: 0; transition: opacity 0.3s; }
    .copy-confirm.show { opacity: 1; }
    .preview-link { margin-top: 12px; }
    .preview-link a { color: #ff4500; font-size: 0.85rem; }
    #preview-frame-wrap { margin-top: 32px; display: none; }
    #preview-frame-wrap h2 { font-size: 1rem; margin-bottom: 12px; color: #ccc; }
    #preview-frame { width: 100%; height: 800px; border: 1px solid #333; border-radius: 6px; }
    #loading-hint { font-size: 0.8rem; color: #555; margin-top: 6px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Widget Generator</h1>
  <p class="subtitle">Team suchen, Farbe wählen, Embed-Code kopieren.</p>

  <label>Teams</label>
  <div id="teams-container"></div>
  <p id="loading-hint">Lade Teamliste…</p>
  <button class="secondary" id="add-team-btn" type="button">+ Team hinzufügen</button>

  <label>Akzentfarbe</label>
  <input type="color" id="color-input" value="#ff4500">

  <div style="margin-top:24px">
    <button id="generate-btn" type="button">Embed-Code generieren</button>
  </div>

  <div id="output-section">
    <h2>Embed-Code</h2>
    <textarea id="embed-output" readonly></textarea>
    <div class="copy-row">
      <button class="secondary" id="copy-btn" type="button">Kopieren</button>
      <span class="copy-confirm" id="copy-confirm">Kopiert!</span>
    </div>
    <div class="preview-link">
      <a id="preview-link" href="#" target="_blank">In neuem Tab öffnen</a>
    </div>
  </div>

  <div id="preview-frame-wrap">
    <h2>Vorschau</h2>
    <iframe id="preview-frame" frameborder="0"></iframe>
  </div>
</div>

<script>
var NAME_MAP = {
  'Nürn': 'Nürnberg Renegades', 'Nürn2': 'Nürnberg Renegades II',
  'Spatz': 'München Spatzen', 'Würz': 'Würzburg',
  'Lions': 'Erlangen Lions', 'LLions': 'Landsberg Lions',
  'Kelk': 'Kelkheim Lizzards', 'Werra': 'Werratal',
  'Bamb': 'Bamberg', 'Regen': 'Regensburg', 'Regen2': 'Regensburg II',
  'Ingol': 'Ingolstadt', 'Ingol2': 'Ingolstadt II',
  'Erlangen2': 'Erlangen 2', 'Ramsenthal': 'Ramsenthal',
  'Ramsenthal2': 'Ramsenthal II', 'Rodental': 'Rödental', 'Erding2': 'Erding II',
};
function resolveTeamName(abbrev) { return NAME_MAP[abbrev] || abbrev; }

// ── SNAPSHOT ──────────────────────────────────────────────────────────────────
var _snapshotPromise = null;
function loadSnapshot() {
  if (!_snapshotPromise) {
    var base = window.location.href.replace(/[^/]*$/, '');
    _snapshotPromise = fetch(base + 'snapshot.json').then(function(r) { return r.json(); });
  }
  return _snapshotPromise;
}

var _teamListPromise = null;
function getTeamList() {
  if (_teamListPromise) return _teamListPromise;
  _teamListPromise = loadSnapshot().then(function(snap) {
    return snap.teams;
  });
  return _teamListPromise;
}

// ── SEARCH ROW ────────────────────────────────────────────────────────────────
function createTeamRow(removable) {
  var row = document.createElement('div');
  row.className = 'team-row';

  var wrap = document.createElement('div');
  wrap.className = 'team-search-wrap';

  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'team-search-input';
  input.placeholder = 'Team suchen…';
  input.autocomplete = 'off';
  input.dataset.teamId = '';

  var dropdown = document.createElement('div');
  dropdown.className = 'team-dropdown';
  dropdown.hidden = true;

  var status = document.createElement('span');
  status.className = 'team-status';

  var focusedIndex = -1;
  var currentItems = [];

  function renderDropdown(items) {
    currentItems = items;
    focusedIndex = -1;
    while (dropdown.firstChild) dropdown.removeChild(dropdown.firstChild);
    if (!items.length) { dropdown.hidden = true; return; }
    items.forEach(function(team) {
      var item   = document.createElement('div');
      item.className = 'team-dropdown-item';

      var nameSpan = document.createElement('span');
      nameSpan.textContent = team.name;  // safe: textContent only

      var idSpan  = document.createElement('span');
      idSpan.className = 'item-id';
      idSpan.textContent = '#' + team.id;

      item.appendChild(nameSpan);
      item.appendChild(idSpan);
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectTeam(team);
      });
      dropdown.appendChild(item);
    });
    dropdown.hidden = false;
  }

  function updateFocus() {
    var items = dropdown.querySelectorAll('.team-dropdown-item');
    items.forEach(function(el, i) { el.classList.toggle('focused', i === focusedIndex); });
    if (items[focusedIndex]) items[focusedIndex].scrollIntoView({ block: 'nearest' });
  }

  function selectTeam(team) {
    input.value = team.name;
    input.dataset.teamId = String(team.id);
    input.classList.add('selected');
    input.classList.remove('err');
    status.textContent = '✓';
    status.className = 'team-status ok';
    dropdown.hidden = true;
  }

  input.addEventListener('input', function() {
    input.dataset.teamId = '';
    input.classList.remove('selected', 'err');
    status.textContent = '';
    status.className = 'team-status';
    var q = input.value.trim().toLowerCase();
    if (!q) { dropdown.hidden = true; return; }
    getTeamList().then(function(list) {
      renderDropdown(list.filter(function(t) {
        return t.name.toLowerCase().includes(q) || t.abbrev.toLowerCase().includes(q);
      }).slice(0, 12));
    });
  });

  input.addEventListener('keydown', function(e) {
    var items = dropdown.querySelectorAll('.team-dropdown-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
      updateFocus();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedIndex = Math.max(focusedIndex - 1, 0);
      updateFocus();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      var target = focusedIndex >= 0 ? items[focusedIndex] : (items.length === 1 ? items[0] : null);
      if (target) target.dispatchEvent(new Event('mousedown'));
    } else if (e.key === 'Escape') {
      dropdown.hidden = true;
    }
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { dropdown.hidden = true; }, 150);
  });

  wrap.appendChild(input);
  wrap.appendChild(dropdown);
  row.appendChild(wrap);
  row.appendChild(status);

  if (removable) {
    var rmBtn = document.createElement('button');
    rmBtn.className = 'remove-btn';
    rmBtn.type = 'button';
    rmBtn.textContent = '×';
    rmBtn.title = 'Entfernen';
    rmBtn.addEventListener('click', function() { row.remove(); });
    row.appendChild(rmBtn);
  }

  return row;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
var container = document.getElementById('teams-container');
container.appendChild(createTeamRow(false));

getTeamList().then(function() {
  document.getElementById('loading-hint').style.display = 'none';
}).catch(function() {
  document.getElementById('loading-hint').textContent = 'Teamliste konnte nicht geladen werden.';
});

document.getElementById('add-team-btn').addEventListener('click', function() {
  container.appendChild(createTeamRow(true));
});

// ── GENERATE ──────────────────────────────────────────────────────────────────
document.getElementById('generate-btn').addEventListener('click', function() {
  var inputs = container.querySelectorAll('.team-search-input');
  var teams  = [];
  var hasErr = false;

  inputs.forEach(function(inp) {
    var id = parseInt(inp.dataset.teamId, 10);
    if (!id || id <= 0) {
      inp.classList.add('err');
      hasErr = true;
    } else {
      teams.push(id);
    }
  });

  if (hasErr || teams.length === 0) return;

  var color  = document.getElementById('color-input').value.replace('#', '');
  var base   = window.location.href.replace('generator.html', 'widget.html');
  var params = teams.map(function(t) { return 't=' + t; }).join('&') + '&color=' + color;
  var src    = base + '?' + params;

  var embedCode = '<iframe\n  src="' + src + '"\n  width="100%"\n  height="800"\n  frameborder="0"\n  style="border:none;"\n></iframe>';

  document.getElementById('embed-output').value = embedCode;
  document.getElementById('preview-link').href  = src;
  document.getElementById('output-section').style.display = 'block';
  document.getElementById('preview-frame').src              = src;
  document.getElementById('preview-frame-wrap').style.display = 'block';
});

document.getElementById('copy-btn').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('embed-output').value).catch(function() {
    document.getElementById('embed-output').select();
    document.execCommand('copy');
  });
  var confirm = document.getElementById('copy-confirm');
  confirm.classList.add('show');
  setTimeout(function() { confirm.classList.remove('show'); }, 2000);
});
</script>
</body>
</html>
